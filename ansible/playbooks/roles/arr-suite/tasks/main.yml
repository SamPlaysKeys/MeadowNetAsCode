---
- name: Template .env file for arr-suite
  ansible.builtin.template:
    src: env.j2
    dest: "{{ role_path }}/files/.env"

- name: Ensure transmission config directory exists
  ansible.builtin.file:
    path: ${DATA_PATH}/transmission
    state: directory
    mode: '0755'

- name: Download and extract flood-for-transmission UI
  ansible.builtin.unarchive:
    src: https://github.com/johman10/flood-for-transmission/releases/latest/download/flood-for-transmission.tar.gz
    dest: ${DATA_PATH}/transmission
    remote_src: yes

- name: Deploy arr-suite containers via Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ role_path }}/files"
    state: present

- name: Clean up .env file
  ansible.builtin.file:
    path: "{{ role_path }}/files/.env"
    state: absent
