---
vault_docker_project_dir: /opt/vault
vault_config_dir: "{{ vault_docker_project_dir }}/config"
vault_data_dir: "{{ vault_docker_project_dir }}/data"
vault_logs_dir: "{{ vault_docker_project_dir }}/logs"

vault_compose_filename: compose.yml
vault_container_name: vault
vault_image: "hashicorp/vault:latest"

vault_api_addr: "http://127.0.0.1:8200"
vault_cluster_addr: "http://127.0.0.1:8201"

vault_listener_address: "0.0.0.0:8200"
vault_cluster_listener_address: "0.0.0.0:8201"

vault_ui_enabled: true
vault_disable_mlock: true
vault_raft_node_id: "{{ inventory_hostname }}"
